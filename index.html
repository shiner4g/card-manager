<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신용카드 실적관리</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .card-header {
      padding: 14px 16px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
    }
    .card-body {
      padding: 14px 16px 16px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: end;
      flex-wrap: wrap;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .field.flex-1 { flex: 1; }
    label {
      font-size: 13px;
      color: #475569;
    }
    input, select {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #fff;
      font-size: 14px;
    }
    button {
      height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    button.primary {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
    }
    button.danger {
      background: #dc2626;
      color: #fff;
      border-color: #dc2626;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .badge {
      min-width: 28px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #e2e8f0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px 6px;
      border-bottom: 1px solid #e2e8f0;
      white-space: nowrap;
    }
    th {
      background: #f1f5f9;
      text-align: left;
      font-size: 13px;
      color: #475569;
    }
    td.right, th.right { text-align: right; }
    td.center, th.center { text-align: center; }
    tbody tr { cursor: pointer; }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr.selected { background: #e2e8f0; }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .detail-box {
      background: #f1f5f9;
      border-radius: 14px;
      padding: 12px;
    }
    .detail-box .k {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
    }
    .detail-box .v {
      font-size: 15px;
      font-weight: 700;
    }
    .muted {
      font-size: 12px;
      color: #64748b;
    }
    .btn-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .btn-grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 20;
    }
    .modal.show { display: flex; }
    .modal-panel {
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow: auto;
      background: #fff;
      border-radius: 18px;
      padding: 18px;
    }
    .modal-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
    }
    .modal-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .subcard {
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }
    .basic-item-row {
      display: grid;
      grid-template-columns: 2fr 90px 72px;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    .basic-item-row:last-child { margin-bottom: 0; }
    .check-inline {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: #334155;
      white-space: nowrap;
    }
    .check-inline input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>신용카드 실적관리</h1>

    <section class="card">
      <div class="card-header">
        <div class="card-title">사용실적 입력</div>
      </div>
      <div class="card-body">
        <div class="row" style="align-items:end;">
          <div class="field flex-1">
            <label for="usageCardSelect">카드</label>
            <select id="usageCardSelect"></select>
          </div>
          <div class="field" style="width:90px;">
            <label for="usageAmountInput">금액(원)</label>
            <input id="usageAmountInput" type="number" placeholder="원" style="width:11ch;" />
          </div>
          <div style="display:flex;flex-direction:column;justify-content:flex-end;">
            <button id="applyUsageBtn" class="primary">반영</button>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-start;gap:12px;margin-top:8px;min-height:24px;align-items:center;">
          <label id="basicCheckWrap" class="check-inline" style="display:none;">
            <input id="basicCheckInput" type="checkbox" />
            <span>기본 실적</span>
          </label>
          <label id="naverCheckWrap" class="check-inline" style="display:none;">
            <input id="naverCheckInput" type="checkbox" />
            <span>네이버 쇼핑</span>
          </label>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-title">카드 실적</div>
        <div id="cardCount" class="badge">0</div>
      </div>
      <div class="card-body" style="padding-top: 0;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:10px;max-width:10px;">카드</th>
                <th class="right">기본</th>
                <th class="right">사용</th>
                <th class="right">총</th>
                <th class="right">목표</th>
                <th class="center" style="width:36px;padding:6px 2px;">달성</th>
                <th class="right" style="width:36px;padding:6px 2px;">네</th>
              </tr>
            </thead>
            <tbody id="cardTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-title">카드 세부 내용</div>
      </div>
      <div class="card-body">
        <div id="detailArea"></div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-title">카드 관리</div>
        <button id="resetAllBtn">전체 초기화</button>
      </div>
      <div class="card-body">
        <div style="margin-bottom:10px;">
          <button id="addCardBtn" class="primary" style="width:100%;">카드 추가</button>
        </div>
        <div class="field" style="margin-bottom: 12px;">
          <label for="manageCardSelect">대상 카드</label>
          <select id="manageCardSelect"></select>
        </div>
        <div class="btn-grid-3" style="margin-bottom: 8px;">
          <button id="editCardBtn">수정</button>
          <button id="resetCardBtn">초기화</button>
          <button id="deleteCardBtn" class="danger">삭제</button>
        </div>
        <div class="btn-grid-2">
          <button id="moveUpBtn">위로</button>
          <button id="moveDownBtn">아래로</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-title">기본실적 관리</div>
      </div>
      <div class="card-body">
        <div class="field" style="margin-bottom: 12px;">
          <label for="basicManageCardSelect">대상 카드</label>
          <select id="basicManageCardSelect"></select>
        </div>
        <div class="subcard">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;">
            <div style="font-size:14px;font-weight:700;">기본실적 항목</div>
            <button id="basicManageAddBtn" type="button">항목 추가</button>
          </div>
          <div id="basicManageEditor"></div>
        </div>
        <div style="margin-top:10px;">
          <button id="saveBasicManageBtn" class="primary" style="width:100%;">기본실적 저장</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-title">데이터 관리</div>
        <button id="monthStartResetBtn">월초 초기화</button>
      </div>
      <div class="card-body">
        <div class="btn-grid-2">
          <button id="importBtn">가져오기</button>
          <button id="exportBtn">내보내기</button>
        </div>
        <input id="importFileInput" type="file" accept="application/json" style="display:none;" />
      </div>
    </section>
  </div>

  <div id="cardModal" class="modal">
    <div class="modal-panel">
      <div id="modalTitle" class="modal-title">카드 등록</div>
      <div class="modal-fields">
        <div class="field">
          <label for="modalName">카드명</label>
          <input id="modalName" type="text" maxlength="5" />
        </div>
        <div class="field">
          <label for="modalBase">기본실적 (원)</label>
          <input id="modalBase" type="number" />
        </div>
        <div class="field">
          <label for="modalSpend">사용실적 (원)</label>
          <input id="modalSpend" type="number" />
        </div>
        <div class="field">
          <label for="modalTarget">목표실적 (원)</label>
          <input id="modalTarget" type="number" />
        </div>
        <div class="field" id="modalNaverWrap" style="display:none;">
          <label for="modalNaver">네이버 쇼핑 (원)</label>
          <input id="modalNaver" type="number" />
        </div>
      </div>
      <div class="modal-actions">
        <button id="cancelModalBtn">취소</button>
        <button id="saveModalBtn" class="primary">저장</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const STORAGE_KEY = 'card-performance-tracker-v1';
    const FIRESTORE_COLLECTION = 'cardApp';
    const FIRESTORE_DOCUMENT = 'user1';

    const firebaseConfig = {
      apiKey: "AIzaSyBDKoHwd-wMPZgAjvFq3h91KNWx_ajCw4Y",
      authDomain: "card-manager-508a1.firebaseapp.com",
      projectId: "card-manager-508a1",
      storageBucket: "card-manager-508a1.firebasestorage.app",
      messagingSenderId: "566398999690",
      appId: "1:566398999690:web:3e9a8d5ab32e6ded66a173"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const initialCards = [
      {
        id: crypto.randomUUID(),
        name: '클립',
        baseAmount: 420000,
        baseItems: [
          { id: crypto.randomUUID(), name: '관리비', amount: 320000 },
          { id: crypto.randomUUID(), name: '주유비', amount: 100000 }
        ],
        spendAmount: 120000,
        targetAmount: 500000,
        naverAmount: 0
      },
      {
        id: crypto.randomUUID(),
        name: '네이버',
        baseAmount: 4900,
        baseItems: [
          { id: crypto.randomUUID(), name: '멤버십', amount: 4900 }
        ],
        spendAmount: 90000,
        targetAmount: 300000,
        naverAmount: 30000
      }
    ];

    let state = {
      cards: [],
      selectedCardId: '',
      manageCardId: '',
      detailCardId: '',
      basicManageCardId: '',
      editingCardId: null,
      basicManageItems: []
    };

    let saveTimer = null;
    let lastSavedJson = '';
    let syncMessageTimer = null;

    const $ = (id) => document.getElementById(id);

    function showSyncStatus(message, isError = false) {
      let box = $('syncStatus');
      if (!box) {
        box = document.createElement('div');
        box.id = 'syncStatus';
        box.style.margin = '0 0 12px';
        box.style.padding = '10px 12px';
        box.style.borderRadius = '12px';
        box.style.fontSize = '13px';
        box.style.border = '1px solid #cbd5e1';
        box.style.background = '#f8fafc';
        box.style.color = '#334155';
        const wrap = document.querySelector('.wrap');
        const firstCard = document.querySelector('.wrap .card');
        wrap.insertBefore(box, firstCard);
      }

      box.textContent = message;
      box.style.borderColor = isError ? '#fecaca' : '#cbd5e1';
      box.style.background = isError ? '#fef2f2' : '#f8fafc';
      box.style.color = isError ? '#991b1b' : '#334155';

      if (syncMessageTimer) clearTimeout(syncMessageTimer);
      if (!isError) {
        syncMessageTimer = setTimeout(() => {
          const current = $('syncStatus');
          if (current && current.textContent === message) {
            current.textContent = 'Firebase 동기화 연결됨';
          }
        }, 2000);
      }
    }

    function toMan(value) {
      const v = (Number(value) || 0) / 10000;
      return Math.floor(v * 10) / 10;
    }

    function formatWon(value) {
      return new Intl.NumberFormat('ko-KR').format(Number(value) || 0);
    }

    function getTodayText() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      const ss = String(d.getSeconds()).padStart(2, '0');
      return `${y}${m}${day}_${hh}${mm}${ss}`;
    }

    function normalizeCard(card) {
      const baseItems = Array.isArray(card.baseItems)
        ? card.baseItems.map(item => ({
            id: item.id || crypto.randomUUID(),
            name: item.name || '',
            amount: Number(item.amount) || 0
          }))
        : [];

      const hasBaseAmount = card.baseAmount !== undefined && card.baseAmount !== null && card.baseAmount !== '';
      const fallbackBase = Number(card.baseAmount) || 0;
      const calculatedBase = baseItems.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);

      return {
        id: card.id || crypto.randomUUID(),
        name: card.name || '이름없음 카드',
        baseAmount: hasBaseAmount ? fallbackBase : calculatedBase,
        baseItems,
        spendAmount: Number(card.spendAmount) || 0,
        targetAmount: Number(card.targetAmount) || 0,
        naverAmount: Number(card.naverAmount) || 0
      };
    }

    function getBaseTemplateTotal(card) {
      return (card.baseItems || []).reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
    }

    function isNaverCard(card) {
      return !!card && String(card.name || '').includes('네이버');
    }

    function loadCardsFromLocal() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return null;
        const parsed = JSON.parse(saved);
        if (!Array.isArray(parsed)) return null;
        return parsed.map(normalizeCard);
      } catch {
        return null;
      }
    }

    function saveCardsToLocal(cards) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
    }

    async function loadCardsFromFirestore() {
      const snapshot = await getDoc(doc(db, FIRESTORE_COLLECTION, FIRESTORE_DOCUMENT));
      if (!snapshot.exists()) return null;

      const payload = snapshot.data();
      if (!payload || !Array.isArray(payload.cards)) return null;

      return payload.cards.map(normalizeCard);
    }

    async function saveCardsToFirestore(cards) {
      await setDoc(doc(db, FIRESTORE_COLLECTION, FIRESTORE_DOCUMENT), {
        cards,
        updatedAt: new Date().toISOString(),
        version: 4
      }, { merge: true });
    }

    function scheduleSave() {
      const json = JSON.stringify(state.cards);
      saveCardsToLocal(state.cards);

      if (json === lastSavedJson) return;
      if (saveTimer) clearTimeout(saveTimer);

      saveTimer = setTimeout(async () => {
        try {
          await saveCardsToFirestore(state.cards);
          lastSavedJson = JSON.stringify(state.cards);
          showSyncStatus('Firebase에 저장되었습니다.');
        } catch (error) {
          console.error(error);
          showSyncStatus('Firebase 저장 실패 - Firestore Rules를 확인해 주세요.', true);
        }
      }, 500);
    }

    function ensureSelection() {
      if (state.cards.length === 0) {
        state.selectedCardId = '';
        state.manageCardId = '';
        state.detailCardId = '';
        state.basicManageCardId = '';
        return;
      }
      if (!state.cards.some(c => c.id === state.selectedCardId)) state.selectedCardId = state.cards[0].id;
      if (!state.cards.some(c => c.id === state.manageCardId)) state.manageCardId = state.cards[0].id;
      if (!state.cards.some(c => c.id === state.detailCardId)) state.detailCardId = state.cards[0].id;
      if (!state.cards.some(c => c.id === state.basicManageCardId)) state.basicManageCardId = state.cards[0].id;
    }

    function getCardById(id) {
      return state.cards.find(card => card.id === id) || null;
    }

    function renderSelect(selectEl, value) {
      selectEl.innerHTML = '';
      state.cards.forEach(card => {
        const opt = document.createElement('option');
        opt.value = card.id;
        opt.textContent = card.name;
        selectEl.appendChild(opt);
      });
      selectEl.value = value || '';
    }

    function syncBasicManageItems(cardId) {
      const card = getCardById(cardId);
      state.basicManageItems = card
        ? (card.baseItems || []).map(item => ({
            id: item.id || crypto.randomUUID(),
            name: item.name || '',
            amount: Number(item.amount) || 0
          }))
        : [];
    }

    function renderTable() {
      const tbody = $('cardTableBody');
      tbody.innerHTML = '';

      if (state.cards.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="7" class="center" style="padding:16px;color:#64748b;">카드 없음</td>';
        tbody.appendChild(tr);
        return;
      }

      state.cards.forEach((card) => {
        const total = (Number(card.baseAmount) || 0) + (Number(card.spendAmount) || 0);
        const achieved = (card.targetAmount || 0) > 0 && total >= card.targetAmount;

        const tr = document.createElement('tr');
        if (card.id === state.detailCardId) tr.classList.add('selected');
        tr.innerHTML = `
          <td style="width:70px;max-width:70px;overflow:hidden;white-space:nowrap;">${escapeHtml(card.name)}</td>
          <td class="right">${toMan(card.baseAmount)}</td>
          <td class="right">${toMan(card.spendAmount)}</td>
          <td class="right"><strong>${toMan(total)}</strong></td>
          <td class="right">${toMan(card.targetAmount)}</td>
          <td class="center" style="padding:6px 2px;"><strong>${achieved ? 'V' : ''}</strong></td>
          <td class="right" style="padding:6px 2px;">${card.naverAmount ? toMan(card.naverAmount) : ''}</td>
        `;
        tr.addEventListener('click', () => {
          state.detailCardId = card.id;
          state.manageCardId = card.id;
          state.selectedCardId = card.id;
          state.basicManageCardId = card.id;
          syncBasicManageItems(card.id);
          render();
        });
        tbody.appendChild(tr);
      });
    }

    function renderDetail() {
      const detailArea = $('detailArea');
      const card = getCardById(state.detailCardId);

      if (!card) {
        detailArea.innerHTML = '<div class="muted">카드를 선택해 주세요.</div>';
        return;
      }

      const total = (Number(card.baseAmount) || 0) + (Number(card.spendAmount) || 0);
      detailArea.innerHTML = `
        <div style="margin-bottom:12px;">
          <div style="font-size:18px;font-weight:700;">${escapeHtml(card.name)}</div>
        </div>
        <div class="detail-grid">
          <div class="detail-box">
            <div class="k">기본실적</div>
            <div class="v">${formatWon(card.baseAmount)}원</div>
          </div>
          <div class="detail-box">
            <div class="k">사용실적</div>
            <div class="v">${formatWon(card.spendAmount)}원</div>
          </div>
          <div class="detail-box">
            <div class="k">총 실적</div>
            <div class="v">${formatWon(total)}원</div>
          </div>
          <div class="detail-box">
            <div class="k">목표실적</div>
            <div class="v">${formatWon(card.targetAmount)}원</div>
          </div>
        </div>
        ${isNaverCard(card) ? `
          <div class="detail-box" style="margin-top:12px;">
            <div class="k">네이버 쇼핑</div>
            <div class="v">${formatWon(card.naverAmount)}원</div>
          </div>
        ` : ''}
      `;
    }

    function renderBasicManageEditor() {
      const wrap = $('basicManageEditor');
      wrap.innerHTML = '';

      if (state.cards.length === 0) {
        wrap.innerHTML = '<div class="muted">카드가 없습니다.</div>';
        return;
      }

      if (state.basicManageItems.length === 0) {
        state.basicManageItems.push({ id: crypto.randomUUID(), name: '', amount: 0 });
      }

      state.basicManageItems.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'basic-item-row';
        row.innerHTML = `
          <input type="text" placeholder="항목명" value="${escapeAttr(item.name || '')}" data-type="name" data-index="${index}" />
          <input type="number" placeholder="금액" value="${item.amount || ''}" data-type="amount" data-index="${index}" />
          <button type="button" data-type="remove" data-index="${index}">삭제</button>
        `;
        wrap.appendChild(row);
      });
    }

    function render() {
      ensureSelection();
      scheduleSave();

      $('cardCount').textContent = state.cards.length;
      renderSelect($('usageCardSelect'), state.selectedCardId);
      renderSelect($('manageCardSelect'), state.manageCardId);
      renderSelect($('basicManageCardSelect'), state.basicManageCardId);
      renderTable();
      renderDetail();
      renderBasicManageEditor();

      const selectedCard = getCardById(state.selectedCardId);
      $('naverCheckWrap').style.display = isNaverCard(selectedCard) ? 'flex' : 'none';
      if (!isNaverCard(selectedCard)) $('naverCheckInput').checked = false;
      const hasBaseAmount = !!selectedCard && (Number(selectedCard.baseAmount) || 0) > 0;
      $('basicCheckWrap').style.display = hasBaseAmount ? 'flex' : 'none';
      if (!hasBaseAmount) $('basicCheckInput').checked = false;

      const manageIndex = state.cards.findIndex(card => card.id === state.manageCardId);
      $('applyUsageBtn').disabled = !state.selectedCardId;
      $('editCardBtn').disabled = !state.manageCardId;
      $('resetCardBtn').disabled = !state.manageCardId;
      $('deleteCardBtn').disabled = !state.manageCardId;
      $('moveUpBtn').disabled = !state.manageCardId || manageIndex <= 0;
      $('moveDownBtn').disabled = !state.manageCardId || manageIndex >= state.cards.length - 1;
      $('resetAllBtn').disabled = state.cards.length === 0;
      $('basicManageAddBtn').disabled = state.cards.length === 0;
      $('saveBasicManageBtn').disabled = state.cards.length === 0;
      $('monthStartResetBtn').disabled = state.cards.length === 0;
    }

    function openModal(editingCard) {
      state.editingCardId = editingCard ? editingCard.id : null;
      $('modalTitle').textContent = editingCard ? '카드 수정' : '카드 등록';
      $('modalName').value = editingCard?.name || '';
      $('modalBase').value = editingCard?.baseAmount || 0;
      $('modalTarget').value = editingCard?.targetAmount || 0;
      $('modalSpend').value = editingCard?.spendAmount || 0;
      $('modalNaver').value = editingCard?.naverAmount || 0;
      toggleModalNaverField();
      $('cardModal').classList.add('show');
    }

    function closeModal() {
      $('cardModal').classList.remove('show');
      state.editingCardId = null;
    }

    function saveModal() {
      const name = $('modalName').value.trim();
      if (!name) {
        alert('카드명을 입력해 주세요.');
        return;
      }
      if (name.length > 5) {
        alert('카드명은 한글 5자리까지만 입력해 주세요.');
        return;
      }

      const previousCard = getCardById(state.editingCardId);
      const isNaver = name === '네이버';
      const card = normalizeCard({
        id: state.editingCardId || crypto.randomUUID(),
        name,
        baseAmount: Number($('modalBase').value) || 0,
        baseItems: previousCard ? previousCard.baseItems : [],
        spendAmount: Number($('modalSpend').value) || 0,
        targetAmount: Number($('modalTarget').value) || 0,
        naverAmount: isNaver ? (Number($('modalNaver').value) || 0) : 0
      });

      const idx = state.cards.findIndex(item => item.id === card.id);
      if (idx >= 0) {
        state.cards[idx] = card;
      } else {
        state.cards.unshift(card);
      }

      state.selectedCardId = card.id;
      state.manageCardId = card.id;
      state.detailCardId = card.id;
      state.basicManageCardId = card.id;
      syncBasicManageItems(card.id);
      closeModal();
      render();
    }

    function applyUsage() {
      const cardId = $('usageCardSelect').value;
      const amount = Number($('usageAmountInput').value) || 0;
      const naverChecked = $('naverCheckInput').checked;
      const basicChecked = $('basicCheckInput').checked;
      if (!cardId || amount <= 0) return;

      state.cards = state.cards.map(card => {
        if (card.id !== cardId) return card;

        const currentBase = Number(card.baseAmount) || 0;
        const appliedBaseReduction = basicChecked ? Math.min(amount, currentBase) : 0;
        const updated = {
          ...card,
          spendAmount: (Number(card.spendAmount) || 0) + amount,
          baseAmount: currentBase - appliedBaseReduction
        };

        if (isNaverCard(card) && naverChecked) {
          updated.naverAmount = (Number(card.naverAmount) || 0) + amount;
        }
        return updated;
      });

      state.selectedCardId = cardId;
      state.detailCardId = cardId;
      state.manageCardId = cardId;
      state.basicManageCardId = cardId;
      syncBasicManageItems(cardId);
      $('usageAmountInput').value = '';
      $('naverCheckInput').checked = false;
      $('basicCheckInput').checked = false;
      render();
    }

    function resetCardSpend() {
      const id = $('manageCardSelect').value;
      if (!id) return;
      state.cards = state.cards.map(card =>
        card.id === id ? { ...card, spendAmount: 0, naverAmount: 0 } : card
      );
      state.selectedCardId = id;
      state.detailCardId = id;
      state.basicManageCardId = id;
      syncBasicManageItems(id);
      render();
    }

    function deleteCard() {
      const id = $('manageCardSelect').value;
      if (!id) return;
      const card = getCardById(id);
      if (!card) return;
      if (!confirm(`'${card.name}' 카드를 삭제할까요?`)) return;
      state.cards = state.cards.filter(card => card.id !== id);
      syncBasicManageItems(state.cards[0]?.id || '');
      render();
    }

    function resetAllCards() {
      if (state.cards.length === 0) return;
      if (!confirm('전체 카드의 사용실적을 초기화할까요?')) return;
      state.cards = state.cards.map(card => ({ ...card, spendAmount: 0, naverAmount: 0 }));
      render();
    }

    function monthStartReset() {
      if (state.cards.length === 0) return;
      if (!confirm('월초 초기화를 진행할까요? 사용실적은 0이 되고 기본실적은 목록 합계로 다시 설정됩니다.')) return;
      state.cards = state.cards.map(card => ({
        ...card,
        spendAmount: 0,
        naverAmount: 0,
        baseAmount: getBaseTemplateTotal(card)
      }));
      render();
    }

    function moveCard(direction) {
      const id = $('manageCardSelect').value;
      if (!id) return;

      const index = state.cards.findIndex(card => card.id === id);
      if (index < 0) return;

      const targetIndex = direction === 'up' ? index - 1 : index + 1;
      if (targetIndex < 0 || targetIndex >= state.cards.length) return;

      const newCards = [...state.cards];
      const temp = newCards[index];
      newCards[index] = newCards[targetIndex];
      newCards[targetIndex] = temp;
      state.cards = newCards;
      state.selectedCardId = id;
      state.manageCardId = id;
      state.detailCardId = id;
      state.basicManageCardId = id;
      syncBasicManageItems(id);
      render();
    }

    function saveBasicManage() {
      const cardId = $('basicManageCardSelect').value;
      if (!cardId) return;

      const cleanedItems = state.basicManageItems
        .map(item => ({
          id: item.id || crypto.randomUUID(),
          name: String(item.name || '').trim(),
          amount: Number(item.amount) || 0
        }))
        .filter(item => item.name || item.amount);

      state.cards = state.cards.map(card =>
        card.id === cardId ? { ...card, baseItems: cleanedItems } : card
      );

      state.basicManageCardId = cardId;
      state.selectedCardId = cardId;
      state.manageCardId = cardId;
      state.detailCardId = cardId;
      syncBasicManageItems(cardId);
      render();
    }

    function exportData() {
      const payload = {
        version: 4,
        exportedAt: new Date().toISOString(),
        cards: state.cards
      };

      const filename = `card_${getTodayText()}.json`;
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function importData(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(e.target.result);
          const importedCards = Array.isArray(parsed) ? parsed : parsed.cards;
          if (!Array.isArray(importedCards)) {
            alert('가져올 데이터 형식이 올바르지 않습니다.');
            return;
          }
          state.cards = importedCards.map(normalizeCard);
          state.selectedCardId = state.cards[0]?.id || '';
          state.manageCardId = state.cards[0]?.id || '';
          state.detailCardId = state.cards[0]?.id || '';
          state.basicManageCardId = state.cards[0]?.id || '';
          syncBasicManageItems(state.basicManageCardId);
          render();
        } catch {
          alert('파일을 읽을 수 없습니다.');
        }
      };
      reader.readAsText(file);
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function toggleModalNaverField() {
      const isNaver = $('modalName').value.trim() === '네이버';
      $('modalNaverWrap').style.display = isNaver ? 'flex' : 'none';
      if (!isNaver) {
        $('modalNaver').value = 0;
      }
    }

    function bindEvents() {
      $('addCardBtn').addEventListener('click', () => openModal(null));
      $('cancelModalBtn').addEventListener('click', closeModal);
      $('saveModalBtn').addEventListener('click', saveModal);
      $('modalName').addEventListener('input', () => {
        if ($('modalName').value.length > 5) {
          $('modalName').value = $('modalName').value.slice(0, 5);
        }
        toggleModalNaverField();
      });
      $('applyUsageBtn').addEventListener('click', applyUsage);

      $('usageCardSelect').addEventListener('change', (e) => {
        state.selectedCardId = e.target.value;
        render();
      });

      $('manageCardSelect').addEventListener('change', (e) => {
        state.manageCardId = e.target.value;
        render();
      });

      $('basicManageCardSelect').addEventListener('change', (e) => {
        state.basicManageCardId = e.target.value;
        syncBasicManageItems(state.basicManageCardId);
        render();
      });

      $('basicManageAddBtn').addEventListener('click', () => {
        state.basicManageItems.push({ id: crypto.randomUUID(), name: '', amount: 0 });
        renderBasicManageEditor();
      });

      $('basicManageEditor').addEventListener('input', (e) => {
        const index = Number(e.target.dataset.index);
        const type = e.target.dataset.type;
        if (Number.isNaN(index) || !type || !state.basicManageItems[index]) return;
        if (type === 'name') state.basicManageItems[index].name = e.target.value;
        if (type === 'amount') state.basicManageItems[index].amount = Number(e.target.value) || 0;
      });

      $('basicManageEditor').addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-type="remove"]');
        if (!btn) return;
        const index = Number(btn.dataset.index);
        if (Number.isNaN(index)) return;
        state.basicManageItems.splice(index, 1);
        if (state.basicManageItems.length === 0) {
          state.basicManageItems.push({ id: crypto.randomUUID(), name: '', amount: 0 });
        }
        renderBasicManageEditor();
      });

      $('saveBasicManageBtn').addEventListener('click', saveBasicManage);

      $('editCardBtn').addEventListener('click', () => {
        const card = getCardById($('manageCardSelect').value);
        if (card) openModal(card);
      });

      $('resetCardBtn').addEventListener('click', resetCardSpend);
      $('deleteCardBtn').addEventListener('click', deleteCard);
      $('resetAllBtn').addEventListener('click', resetAllCards);
      $('monthStartResetBtn').addEventListener('click', monthStartReset);
      $('moveUpBtn').addEventListener('click', () => moveCard('up'));
      $('moveDownBtn').addEventListener('click', () => moveCard('down'));
      $('exportBtn').addEventListener('click', exportData);
      $('importBtn').addEventListener('click', () => $('importFileInput').click());
      $('importFileInput').addEventListener('change', (e) => {
        importData(e.target.files[0]);
        e.target.value = '';
      });
      $('cardModal').addEventListener('click', (e) => {
        if (e.target === $('cardModal')) closeModal();
      });
    }

    async function init() {
      bindEvents();

      try {
        const firestoreCards = await loadCardsFromFirestore();
        if (firestoreCards && firestoreCards.length > 0) {
          state.cards = firestoreCards;
          saveCardsToLocal(state.cards);
          lastSavedJson = JSON.stringify(state.cards);
          showSyncStatus('Firebase에서 데이터를 불러왔습니다.');
        } else {
          const localCards = loadCardsFromLocal();
          state.cards = localCards || initialCards.map(normalizeCard);
          showSyncStatus('로컬 데이터를 사용 중입니다. 첫 변경 시 Firebase에 저장됩니다.');
          scheduleSave();
        }
      } catch (error) {
        console.error(error);
        const localCards = loadCardsFromLocal();
        state.cards = localCards || initialCards.map(normalizeCard);
        showSyncStatus('Firebase 연결 실패 - 로컬 데이터로 실행 중입니다.', true);
      }

      ensureSelection();
      syncBasicManageItems(state.basicManageCardId);
      render();
    }

    init();
  </script>
</body>
</html>
